# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /api
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100
# 环境配置
spring:
  profiles:
    active: dev
  application:
    name: ruoyi

# Feign配置
feign:
  hystrix:
    enabled: false
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 60000
        readTimeout: 120000

flowable:
  async-executor-activate: false # 根据需求开启异步
  database-schema-update: false   # 自动创建/更新表结构
  check-process-definitions: false  #禁用 /resources/processes 自动部署 BPMN XML 流程
  idm:
    enabled: false # 禁用Flowable的IDM模块


# MyBatis-Plus 全局配置（与各 profile 的 mybatis-plus 配置合并）
mybatis-plus:
  global-config:
    db-config:
      # 全量更新：前端传过来的数据直接更新，null 也会写入数据库（覆盖默认的 NOT_NULL 忽略策略）
      update-strategy: ignored
